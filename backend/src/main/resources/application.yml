spring:
  application:
    name: fashion-rental
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 24
  auth:
    username: ${APP_USERNAME}
    password: ${APP_PASSWORD}
  storage:
    r2:
      account-id: ${R2_ACCOUNT_ID:dev}
      access-key-id: ${R2_ACCESS_KEY_ID:dev}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:dev}
      bucket-name: ${R2_BUCKET_NAME:dev}
      public-url-base: ${R2_PUBLIC_URL_BASE:http://localhost:9000}
    image:
      max-upload-bytes: 15728640
      full-max-px: 1200
      thumb-max-px: 300
      max-photos-per-item: 8

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.fashionrental: INFO
    org.springframework.security: WARN
