# Render Blueprint — Production Deployment Configuration
# This file defines all services declaratively.
# See infra/render-deployment-plan.md for detailed setup instructions.
#
# Sensitive values (marked sync: false) must be set manually in the Render dashboard.
# Never commit actual secret values here — use env vars only.

services:

  - type: web
    name: fashion-rental-backend
    runtime: java
    region: singapore
    plan: starter
    buildCommand: cd backend && ./gradlew bootJar -x test
    startCommand: java -Xms256m -Xmx400m -jar backend/build/libs/fashion-rental-*.jar
    healthCheckPath: /actuator/health
    autoDeploy: false
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL_BASE
        sync: false

  - type: web
    name: fashion-rental-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: cd frontend && pnpm install && pnpm build
    staticPublishPath: frontend/dist
    autoDeploy: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: fashion-rental-db
    region: singapore
    plan: starter
    databaseName: fashion_rental
    user: fashion_user
